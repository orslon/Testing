# OWASP ZAP DAST scan config
# Used by the Jenkinsfile's DAST stage via `zap-full-scan.py`
# Place this file at the repo root. ZAP reads it automatically
# when passed via -z "-config_file /zap/wrk/zap.conf"

# Spider / scan limits (tune for your environment)
spider.maxDuration=2
ascan.maxScanDurationInMins=5

# Rules to ignore (adjust as needed for your app)
# 10016 = Web Browser XSS Protection Not Enabled (covered by helmet)
# 10017 = Cross-Domain JavaScript Source File Inclusion (false positive for local)
rules.cookie.ignorelist=10016,10017
